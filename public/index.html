<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Nova Credit - Your trusted partner for modern financing. Apply for loans in minutes with our fast, secure, and 100% paperless platform.">
  <meta name="keywords" content="credit card, payment, loan, finance, banking">

  <!-- Open Graph / Social Media Tags -->
  <meta property="og:title" content="Nova Credit - Fast & Paperless Loans">
  <meta property="og:description"
    content="Apply for loans in minutes. Fast approvals, competitive rates, and a 100% paperless digital process. Get the funds you need today.">
  <meta property="og:type" content="website">

  <title>Nova Credit - Fast & Paperless Loans</title>

  <!-- Google Fonts & Material Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS & Config for generated screens -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-surface": "#e4e8f7", "surface-tint": "#72dcff", "on-surface-variant": "#a6abb9", "tertiary-fixed": "#00e3fd",
                      "on-tertiary-fixed-variant": "#005762", "primary-fixed-dim": "#00c3ed", "surface-container-highest": "#1f2634",
                      "on-tertiary-container": "#004d57", "surface-bright": "#242c3c", "on-error-container": "#ffa8a3",
                      "on-primary-container": "#004253", "surface-container-high": "#19202d", "secondary-fixed-dim": "#cabaff",
                      "on-primary": "#004c5e", "error": "#ff716c", "inverse-surface": "#f9f9ff", "surface-dim": "#090e18",
                      "inverse-primary": "#00687f", "surface-container": "#141a26", "secondary-container": "#591adc",
                      "surface-container-low": "#0e131e", "primary-container": "#00d2ff", "outline-variant": "#434854",
                      "primary-dim": "#00c3ed", "error-dim": "#d7383b", "on-background": "#e4e8f7", "on-error": "#490006",
                      "primary-fixed": "#00d2ff", "inverse-on-surface": "#505561", "error-container": "#9f0519", "background": "#090e18",
                      "secondary-fixed": "#d8caff", "surface": "#090e18", "on-secondary-fixed": "#3b00a0", "on-primary-fixed": "#002c38",
                      "secondary": "#a68cff", "tertiary": "#81ecff", "outline": "#717582", "surface-container-lowest": "#000000",
                      "tertiary-fixed-dim": "#00d4ec", "on-secondary": "#25006b", "secondary-dim": "#7e51ff",
                      "on-secondary-fixed-variant": "#591bdc", "primary": "#72dcff", "on-tertiary": "#005762", "tertiary-dim": "#00d4ec",
                      "on-secondary-container": "#e4daff", "on-tertiary-fixed": "#003840", "on-primary-fixed-variant": "#004c5e",
                      "surface-variant": "#1f2634", "tertiary-container": "#00e3fd"
              },
              "borderRadius": { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" }
            }
          }
        }
      </script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    /* When landing or policies page is active, remove page-content constraints */
    .page-content.full-bleed {
      max-width: 100% !important;
      padding: 0 !important;
      min-height: 100vh;
    }
    /* Material symbols inline alignment */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      vertical-align: middle;
    }
    /* Glassmorphism utility */
    .glass-card {
      background: rgba(31, 38, 52, 0.6);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(114, 220, 255, 0.2);
    }
    /* Hero gradient bg */
    .hero-gradient {
      background: radial-gradient(circle at top right, rgba(166, 140, 255, 0.15), transparent),
                  radial-gradient(circle at bottom left, rgba(114, 220, 255, 0.1), transparent);
    }
  </style>
</head>

<body>
  <!-- App Container -->
  <div id="app">
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loader"></div>
      <p>Loading Nova Credit...</p>
    </div>

    <!-- Main Content -->
    <div id="main-content" style="display: none;">
      <!-- Navigation -->
      <nav id="navbar" class="navbar" style="display: none;">
        <div class="navbar-container">
          <div class="navbar-brand">
            <h1>Nova Credit</h1>
            <span class="brand-tagline">100% Paperless Loans</span>
          </div>

          <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div class="navbar-menu" id="nav-menu">
            <a href="#dashboard" class="nav-link active" data-page="dashboard">
              <span class="nav-icon">📊</span>
              Dashboard
            </a>
            <a href="#loans" class="nav-link" data-page="loans">
              <span class="nav-icon">💰</span>
              Loans
            </a>
            <a href="#payments" class="nav-link" data-page="payments">
              <span class="nav-icon">💳</span>
              Payments
            </a>
            <a href="#transactions" class="nav-link" data-page="transactions">
              <span class="nav-icon">📜</span>
              Transactions
            </a>
            <a href="#profile" class="nav-link" data-page="profile">
              <span class="nav-icon">👤</span>
              Profile
            </a>
            <a href="#admin" class="nav-link" data-page="admin" id="admin-nav-link" style="display: none;">
              <span class="nav-icon">🔧</span>
              Admin
            </a>
            <a href="#logs" class="nav-link" data-page="logs" id="logs-nav-link" style="display: none;">
              <span class="nav-icon">📋</span>
              Logs
            </a>
            <a href="#" class="nav-link mobile-only" id="mobile-logout-btn">
              <span class="nav-icon">🚪</span>
              Logout
            </a>
          </div>

          <button id="logout-btn" class="btn btn-secondary desktop-only">Logout</button>
        </div>
      </nav>

      <!-- Page Content -->
      <main id="page-content" class="page-content">
        <!-- Pages will be dynamically loaded here -->
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <script src="/js/utils.js?v=6"></script>
  <script src="/js/main.js?v=6"></script>
  <script src="/js/landing.js?v=6"></script>
  <script src="/js/policies.js?v=6"></script>
  <script src="/js/auth.js?v=6"></script>
  <script src="/js/dashboard.js?v=6"></script>
  <script src="/js/loans.js?v=6"></script>
  <script src="/js/payments.js?v=6"></script>
  <script src="/js/transactions.js?v=6"></script>
  <script src="/js/profile.js?v=6"></script>
  <script src="/js/admin.js?v=6"></script>
  <script src="/js/logs.js?v=6"></script>
</body>

</html>

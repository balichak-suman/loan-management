<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Nova Credit - Your trusted partner for modern financing. Apply for loans in minutes with our fast, secure, and 100% paperless platform.">
  <meta name="keywords" content="credit card, payment, loan, finance, banking">

  <!-- Open Graph / Social Media Tags -->
  <meta property="og:title" content="Nova Credit - Fast & Paperless Loans">
  <meta property="og:description"
    content="Apply for loans in minutes. Fast approvals, competitive rates, and a 100% paperless digital process. Get the funds you need today.">
  <meta property="og:type" content="website">

  <title>Nova Credit - Fast & Paperless Loans</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/components.css">
</head>

<body>
  <!-- App Container -->
  <div id="app">
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loader"></div>
      <p>Loading Nova Credit...</p>
    </div>

    <!-- Main Content -->
    <div id="main-content" style="display: none;">
      <!-- Navigation -->
      <nav id="navbar" class="navbar" style="display: none;">
        <div class="navbar-container">
          <div class="navbar-brand">
            <h1>Nova Credit</h1>
            <span class="brand-tagline">100% Paperless Loans</span>
          </div>

          <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div class="navbar-menu" id="nav-menu">
            <a href="#dashboard" class="nav-link active" data-page="dashboard">
              <span class="nav-icon">📊</span>
              Dashboard
            </a>
            <a href="#loans" class="nav-link" data-page="loans">
              <span class="nav-icon">💰</span>
              Loans
            </a>
            <a href="#payments" class="nav-link" data-page="payments">
              <span class="nav-icon">💳</span>
              Payments
            </a>
            <a href="#transactions" class="nav-link" data-page="transactions">
              <span class="nav-icon">📜</span>
              Transactions
            </a>
            <a href="#profile" class="nav-link" data-page="profile">
              <span class="nav-icon">👤</span>
              Profile
            </a>
            <a href="#admin" class="nav-link" data-page="admin" id="admin-nav-link" style="display: none;">
              <span class="nav-icon">🔧</span>
              Admin
            </a>
            <a href="#logs" class="nav-link" data-page="logs" id="logs-nav-link" style="display: none;">
              <span class="nav-icon">📋</span>
              Logs
            </a>
            <a href="#" class="nav-link mobile-only" id="mobile-logout-btn">
              <span class="nav-icon">🚪</span>
              Logout
            </a>
          </div>

          <button id="logout-btn" class="btn btn-secondary desktop-only">Logout</button>
        </div>
      </nav>

      <!-- Page Content -->
      <main id="page-content" class="page-content">
        <!-- Pages will be dynamically loaded here -->
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <script src="/js/utils.js?v=6"></script>
  <script src="/js/main.js?v=6"></script>
  <script src="/js/auth.js?v=6"></script>
  <script src="/js/dashboard.js?v=6"></script>
  <script src="/js/loans.js?v=6"></script>
  <script src="/js/payments.js?v=6"></script>
  <script src="/js/transactions.js?v=6"></script>
  <script src="/js/profile.js?v=6"></script>
  <script src="/js/admin.js?v=6"></script>
  <script src="/js/logs.js?v=6"></script>
</body>

</html>
